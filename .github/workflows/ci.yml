---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Ruff check
        run: ruff check plugins/

      - name: Ruff format check
        run: ruff format --check plugins/

      - name: Ansible-lint (galaxy metadata)
        run: ansible-lint galaxy.yml

  sanity:
    name: Ansible Sanity
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        ansible-version:
          - stable-2.18
          - stable-2.19
          - stable-2.20
    steps:
      - uses: actions/checkout@v6
        with:
          path: ansible_collections/mrekiba/bao

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install ansible-core (${{ matrix.ansible-version }})
        run: uv pip install --system https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz

      - name: Install collection dependencies
        run: uv pip install --system "hvac>=2.4.0"

      - name: Run sanity tests
        run: ansible-test sanity --local --requirements -v --color
        working-directory: ansible_collections/mrekiba/bao
